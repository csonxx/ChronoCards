name: chrono_cards
description: "ChronoCards - Card-based ARPG mobile game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  equatable: ^2.0.5
  flutter_bloc: ^8.1.6
  
  # Dependency Injection
  get_it: ^7.7.0
  
  # Navigation
  go_router: ^14.2.7
  
  # Game Specific
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  
  # Audio (for game sounds)
  audioplayers: ^6.0.0
  
  # HTTP (for API calls)
  http: ^1.2.0
  
  # Date formatting
  intl: ^0.19.0
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # 3D Model Viewer
  model_viewer_plus: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/models/
